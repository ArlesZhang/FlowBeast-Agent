services:
  api:
    build: ../../.
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    depends_on:
      - db
    restart: unless-stopped
    command: uvicorn flowbeast.api.main:app --host 0.0.0.0 --port 8000

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: datacody
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: datacody
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
